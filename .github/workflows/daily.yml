name: Daily Security Briefing

on:
  schedule:
    # 한국 시간 아침 8시 = UTC 23시 (전날)
    - cron: '30 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 라이브러리 설치
      run: |
        pip install -r requirements.txt

# (선택 사항) 결과물 탭에 PDF 임시 업로드
    - name: PDF 결과물 업로드
      uses: actions/upload-artifact@v4
      with:
        name: Daily-Briefing-PDF
        path: "*.pdf"
        retention-days: 30


    - name: 에이전트 실행
      env:
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: python main.py

    - name: 히스토리 저장 (Commit & Push)
      run: |
        git config --global user.name "NewsBot"
        git config --global user.email "bot@noreply.github.com"
        # 특정 파일 대신, 현재 폴더의 모든 변경사항을 담습니다.
        git add .
        # 변경된 게 없으면 에러 내지 않고 그냥 넘어갑니다.
        git diff --staged --quiet || git commit -m "Update history and logs"
        git push
