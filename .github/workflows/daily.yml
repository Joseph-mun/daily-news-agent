name: Daily Security Briefing

on:
  # 1. 스케줄 실행 (한국 시간 아침 07:30 = UTC 전날 22:30)
  schedule:
    - cron: '30 22 * * *'
  
  # 2. 수동 실행 버튼 활성화
  workflow_dispatch:

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    
    # 로그 시간을 한국 시간으로 표시
    env:
      TZ: 'Asia/Seoul'

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 설정 (3.9 버전)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 필요 라이브러리 설치
        run: |
          pip install requests tavily-python google-generativeai

      - name: 뉴스 브리핑 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # [네이버]
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # [카카오]
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          python main.py
      
      # PDF 업로드나 history push 단계는 이제 선택사항 (지워도 무방)
